services:
  postgres:
    image: postgres:16-alpine
    container_name: webflux-notification-server-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: webflux_notification_server
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d webflux_notification_server"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
