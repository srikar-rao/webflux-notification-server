openapi: 3.0.3
info:
  title: Integration API Models
  version: 1.0.0
  description: Contract-First API specification for external integration models

paths: {} # Models only, no controller APIs generated

components:
  schemas:
    TodoIntegrationResponse:
      type: object
      description: DTO for external Todo response from JSONPlaceholder
      required: [id, userId, title, completed]
      properties:
        id: {type: integer, format: int64, example: 1}
        userId: {type: integer, format: int64, example: 101}
        title: {type: string, example: "Buy groceries"}
        completed: {type: boolean, example: false}
