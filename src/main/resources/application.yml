spring:
  application:
    name: webflux-notification-server
  main:
    web-application-type: reactive

  # Virtual threads (Java 21+)
  threads:
    virtual:
      enabled: true

  webflux:
    base-path: /api

  r2dbc:
    url: r2dbc:postgresql://localhost:5432/webflux_notification_server
    username: postgres
    password: postgres

  docker:
    compose:
      lifecycle-management: start-only
      file: compose.yaml
      readiness:
        tcp:
          connect-timeout: 30s
          read-timeout: 30s

  sql:
    init:
      mode: always

  # ===== JACKSON CONFIGURATION =====
  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false

# ===== SERVER CONFIGURATION =====
server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
    min-response-size: 1024

# ===== MANAGEMENT/ACTUATOR CONFIGURATION =====
management:
  server:
    port: 8080
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99
    enable:
      http: true
    tags:
      application: ${spring.application.name}
  tracing:
    enabled: true
    sampling:
      probability: 1.0

# ===== OPENAPI/SWAGGER CONFIGURATION =====
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /docs
    enabled: true
  info:
    title: WebFlux Notification Server API
    description: Reactive Spring Boot WebFlux service with local PostgreSQL via Docker Compose
    version: '@project.version@'
    contact:
      name: Srikar Rao
      email: srikarrao1994@gmail.com

# ===== APPLICATION-SPECIFIC CONFIGURATION =====
app:
  cors:
    allowed-origins: "*"
  redis:
    notification-channel: notifications.created

logging:
  level:
    root: INFO
    com.dev.org: DEBUG
    org.springframework.web: INFO
